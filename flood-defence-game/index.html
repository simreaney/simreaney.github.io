<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Defence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div id="hud-left">
                <span id="money-display">£200</span>
                <span id="income-display">Income: £0/turn</span>
                <span id="turn-display">Turn: 1</span>
            </div>
            <div id="hud-center">
                <h1>Flood Defence</h1>
            </div>
            <div id="hud-right">
                <button id="btn-house" class="tool-btn active" title="Place House (Free)">🏠 House</button>
                <button id="btn-wall" class="tool-btn" title="Place 1m Flood Wall (£500)">🧱 1m Wall £500</button>
                <button id="btn-end-turn" class="action-btn">End Turn ⏭</button>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="flood-alert" class="hidden">
            <div id="flood-alert-content">
                <h2 id="flood-alert-title">Flood!</h2>
                <p id="flood-alert-text"></p>
                <button id="flood-alert-ok">OK</button>
            </div>
        </div>
        <div id="game-over" class="hidden">
            <div id="game-over-content">
                <h2>Game Over</h2>
                <p id="game-over-text"></p>
                <button id="game-over-restart">Play Again</button>
            </div>
        </div>
        <div id="tooltip" class="hidden"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
